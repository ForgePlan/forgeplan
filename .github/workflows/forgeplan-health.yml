name: Architecture Health

on:
  pull_request:
    branches: [dev, main]
    paths:
      - '.forgeplan/**'
      - 'crates/**'

jobs:
  health:
    name: Forgeplan Health Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust compilation cache
        uses: Swatinem/rust-cache@v2

      - name: Build forgeplan
        run: cargo build -p forgeplan

      - name: Rebuild index from tracked markdown
        run: |
          # Temporarily rename .forgeplan so init can create fresh workspace with LanceDB
          mv .forgeplan .forgeplan-src
          ./target/debug/forgeplan init -y
          # Restore tracked markdown artifacts over the fresh workspace
          cp -r .forgeplan-src/prds/ .forgeplan-src/rfcs/ .forgeplan-src/adrs/ \
                .forgeplan-src/epics/ .forgeplan-src/specs/ .forgeplan-src/evidence/ \
                .forgeplan-src/problems/ .forgeplan-src/solutions/ .forgeplan-src/notes/ \
                .forgeplan-src/refresh/ .forgeplan-src/memory/ .forgeplan/ 2>/dev/null || true
          rm -rf .forgeplan-src
          ./target/debug/forgeplan scan-import

      - name: Health check
        run: ./target/debug/forgeplan health --ci --fail-on "orphans=10,blind_spots=5"

      - name: Validate artifacts
        run: ./target/debug/forgeplan validate --ci

      - name: MCP tool count drift check
        # Drift detector — fails CI if README/CLAUDE/landing/docs disagree
        # with actual MCP tool count в src. Lessons learned 2026-05-04:
        # external OpenAI agent caught 18+ stale references (28/37/45/47
        # vs actual 63) that passive grep sweeps had been missing.
        # PR 2.6 audit C-2: this step closes "preventive value theoretical"
        # finding by wiring the script into the health gate.
        run: ./scripts/check-mcp-tool-count.sh
