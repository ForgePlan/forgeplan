name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  # Validation gate: check Forgeplan artifact frontmatter contract per SPEC-005.
  # Fires only on PRs that touch .forgeplan/**/*.md files AND target `dev` OR hotfix→main.
  #
  # PROB-060 Phase 2.1 audit Round 2 Code FINDING-3 closure: do NOT run on
  # PRs targeting `main` that are release/* (release/v* -> main). The assign-id
  # bot only runs on `dev`, so `main` lags `dev` for `assigned_number` mutations.
  # A release PR would see `assigned_number: null` in base (main) and `73` in
  # HEAD (dev), triggering a false write-once violation.
  #
  # HOWEVER: hotfix/* → main PRs ARE allowed. Hotfixes bypass `dev` and go
  # directly to `main`, so artifact mutations are legitimate in this flow.
  # The condition extends to: `base_ref == 'dev' OR (base_ref == 'main' AND
  # head_ref doesn't start with 'release/')`. This keeps the contract enforced
  # where the bot can mint numbers, while letting release-promotion PRs (which
  # are already vetted on `dev`) flow without re-validating already-vetted state.
  #
  # Security note: github.base_ref is safe for equality checks (literal string,
  # no command injection risk in `if:` expressions). For defensive depth, the
  # validation script also passes BASE_REF via env (hardened in CRIT-1 fix).
  validate-forgeplan-frontmatter:
    name: Validate Forgeplan artifact frontmatter
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.base_ref == 'dev' || (github.base_ref == 'main' && !startsWith(github.head_ref, 'release/')))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git diff to work correctly

      - name: Check if PR touches Forgeplan artifacts
        id: check_artifacts
        run: |
          # Check if any .forgeplan/**/*.md files were changed
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^\.forgeplan/.*\.md$'; then
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate frontmatter contract
        if: steps.check_artifacts.outputs.has_artifacts == 'true'
        run: |
          # Make script executable
          chmod +x .github/scripts/validate-forgeplan-frontmatter.sh

          # Run validation
          .github/scripts/validate-forgeplan-frontmatter.sh
        env:
          # CRIT-1 fix: pass BASE_REF for write-once validation
          BASE_REF: ${{ github.base_ref }}
          # Ensure we can access git history for diff operations
          GIT_TRACE: 0

      - name: Skip validation (no artifact changes)
        if: steps.check_artifacts.outputs.has_artifacts == 'false'
        run: |
          echo "✓ No Forgeplan artifacts were changed in this PR"

  check-kind-list-drift:
    name: Check artifact kind list drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Rust enum vs bash validator drift
        run: |
          chmod +x scripts/check-kind-list-drift.sh
          scripts/check-kind-list-drift.sh

  # PROB-060 Phase 2.3 (T4) — workspace audit of frontmatter validator coverage.
  #
  # Self-test job: runs scripts/validator-audit-all.sh against the canonical
  # workspace on every push/PR. Catches three classes of regression:
  # 1. Hand-edited slug shape drift (uppercase/underscore/spaces in committed slug).
  # 2. New artifact lacking required new-schema triple (slug + predicted_number +
  #    explicit assigned_number) where the frontmatter is partially populated
  #    (slug without predicted_number, etc. — corruption signal per
  #    validator-audit-all.sh).
  # 3. Validator script regression (mismatched SLUG_REGEX, broken extract_field
  #    after CI Round 4 pipefail fix).
  #
  # Mode: default (warnings allowed, errors fail). Strict mode is reserved for
  # future post-migration cleanup once all legacy artifacts are migrated to the
  # new schema (PROB-060 Phase 4).
  #
  # Security: this job invokes only repo-resident static scripts with no PR
  # input flowing to shell — the script reads .forgeplan/*.md files from disk,
  # which themselves go through the same validator on artifact PRs (see the
  # validate-forgeplan-frontmatter job above). No untrusted github.* fields
  # are interpolated into run: blocks.
  #
  # Additive — does NOT depend on check or test, runs in parallel and cannot
  # block other CI flows. Fast (~1 second) — bash-only, no compilation.
  validator-self-test:
    name: Validator workspace self-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run validator audit on workspace
        run: |
          chmod +x scripts/validator-audit-all.sh
          bash scripts/validator-audit-all.sh

  check:
    name: Check, Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Probe sccache backend
        # Probe whether the GHA cache backend is healthy. If reachable,
        # set RUSTC_WRAPPER for subsequent steps. If unreachable (Azure
        # outage etc.), leave it unset so cargo uses direct rustc.
        # This prevents a hard CI failure from third-party infrastructure
        # outages — the trade-off is a slower run on probe failure, not
        # a broken pipeline (lesson learned from PR #226 first attempt).
        run: |
          export SCCACHE_GHA_ENABLED=true
          if timeout 30 sccache --start-server >/dev/null 2>&1; then
            # Server started — try a tiny rustc invocation to confirm the
            # backend is actually reachable for read/write operations.
            echo 'fn main() {}' > /tmp/probe.rs
            if timeout 30 sccache rustc \
                --edition 2021 \
                --crate-name probe \
                --crate-type bin \
                /tmp/probe.rs \
                -o /tmp/probe 2>/dev/null; then
              echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
              echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
              echo "✓ sccache probe passed — wrapper enabled"
            else
              sccache --stop-server >/dev/null 2>&1 || true
              echo "✗ sccache probe failed (rustc invocation) — falling back to direct rustc"
            fi
          else
            echo "✗ sccache probe failed (server start) — falling back to direct rustc"
          fi

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets

      - name: sccache stats
        if: always() && env.RUSTC_WRAPPER == 'sccache'
        run: sccache --show-stats || true

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Probe sccache backend
        # Same probe pattern as in the check job — see comment above.
        run: |
          export SCCACHE_GHA_ENABLED=true
          if timeout 30 sccache --start-server >/dev/null 2>&1; then
            echo 'fn main() {}' > /tmp/probe.rs
            if timeout 30 sccache rustc \
                --edition 2021 \
                --crate-name probe \
                --crate-type bin \
                /tmp/probe.rs \
                -o /tmp/probe 2>/dev/null; then
              echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
              echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
              echo "✓ sccache probe passed — wrapper enabled"
            else
              sccache --stop-server >/dev/null 2>&1 || true
              echo "✗ sccache probe failed (rustc invocation) — falling back to direct rustc"
            fi
          else
            echo "✗ sccache probe failed (server start) — falling back to direct rustc"
          fi

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: cargo nextest run
        run: cargo nextest run --workspace --all-targets

      - name: cargo test (doc-tests)
        # nextest does not run doc-tests yet
        # (https://github.com/nextest-rs/nextest/issues/16). Run separately
        # to maintain coverage parity with the previous workflow.
        run: cargo test --workspace --doc

      - name: sccache stats
        if: always() && env.RUSTC_WRAPPER == 'sccache'
        run: sccache --show-stats || true
