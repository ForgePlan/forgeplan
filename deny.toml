# cargo-deny configuration for forgeplan
#
# Catches security advisories, license issues, and duplicate-version churn
# in CI before merge. Initial rollout via .github/workflows/security.yml
# runs with continue-on-error: true to establish a baseline — flip to
# blocking after the first clean run on dev.
#
# Schema is cargo-deny 0.19+ (action @v2.x). Older keys like
# `vulnerability`, `unlicensed`, `copyleft`, `default`, `allow-osi-fsf-free`,
# `notice` were removed upstream — do not re-add.

[graph]
# Targets we actually ship: macOS arm64/x64 + Linux x64 (release-plz / cargo-dist).
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
]
all-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Severity-based gating is no longer a config key — cargo-deny denies
# any matched advisory by default. Use `ignore` to allow-list specific
# advisories with a rationale + tracking issue.
unmaintained = "workspace"
yanked = "deny"
ignore = [
    # RUSTSEC-XXXX-YYYY — track via PROB-XXX, dismiss when upstream fix lands.
    # Format: "RUSTSEC-2024-0000" or { crate = "name@1.2", reason = "..." }
]

[licenses]
# High confidence (default is 0.8) reduces false positives when inferring
# from LICENSE text. Aligned with cargo-deny's own recommended baseline.
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
]
exceptions = [
    # { allow = ["GPL-3.0"], crate = "specific-crate" },
]

[bans]
# Warn on multiple versions of the same crate (transitive duplicates) —
# downgrade to deny once we've resolved current duplicates.
multiple-versions = "warn"
# Wildcards in Cargo.toml version requirements are sloppy but currently
# present in workspace; keep warn to surface, not block.
wildcards = "warn"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
# Surface unexpected registries / git sources without blocking initially.
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
